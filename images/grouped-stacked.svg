  <text x="472" y="295" font-size="8" fill="#898781" text-anchor="middle">Abu Dhabi</text>

  <!-- Sharjah stacked -->
  <rect x="520" y="244" width="44" height="34" fill="#66aadd" opacity="0.9"/>
  <rect x="520" y="239" width="44" height="5"  fill="#4477aa" opacity="0.9"/>
  <rect x="520" y="277" width="44" height="2"  fill="#cc6677" opacity="0.9"/>
