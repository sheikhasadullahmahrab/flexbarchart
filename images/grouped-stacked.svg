  <text x="576" y="316" font-size="8" fill="#595959">Cargo</text>

  <!-- Caption -->
  <text x="340" y="358" font-size="10" fill="#898781" text-anchor="middle">Six label orientations · App theme colors · Full-row tooltips · Auto-responsive sizing</text>
