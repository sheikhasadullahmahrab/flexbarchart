  <rect x="140" y="90" width="14"  height="13" fill="#882255" opacity="0.9"/>
  <!-- label col dubai -->
  <rect x="583" y="63" width="6" height="9" rx="1" fill="#888780"/>
  <text x="592" y="71" font-size="9" font-weight="600" fill="#0b0b0b">804.8M</text>
  <line x1="551" y1="70" x2="580" y2="70" stroke="#66aadd" stroke-width="1.2"/>
  <rect x="583" y="74" width="6" height="9" rx="1" fill="#66aadd" opacity="0.9"/>
  <text x="592" y="82" font-size="9" fill="#0b0b0b">796.3M</text>
  <line x1="142" y1="88" x2="580" y2="88" stroke="#cc6677" stroke-width="0.7" stroke-dasharray="4,2" opacity="0.7"/>
