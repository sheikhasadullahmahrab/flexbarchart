  <text x="592" y="211" font-size="9" font-weight="600" fill="#0b0b0b">126.8M</text>
  <line x1="200" y1="211" x2="580" y2="211" stroke="#66aadd" stroke-width="0.7" stroke-dasharray="4,2" opacity="0.6"/>
  <rect x="583" y="214" width="6" height="9" rx="1" fill="#66aadd" opacity="0.9"/>
  <text x="592" y="222" font-size="9" fill="#0b0b0b">124.5M</text>
  <rect x="583" y="225" width="6" height="9" rx="1" fill="#cc6677" opacity="0.9"/>
