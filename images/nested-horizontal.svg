  <rect x="140" y="200" width="62" height="48" rx="2" fill="#c8c7c0" stroke="#888780" stroke-width="0.8"/>
  <rect x="140" y="202" width="60" height="12" fill="#66aadd" opacity="0.9"/>
  <rect x="140" y="226" width="1" height="10" fill="#882255" opacity="0.9"/>
