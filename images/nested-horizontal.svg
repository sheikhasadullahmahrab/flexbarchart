  <text x="468" y="355" font-size="9" fill="#898781" text-anchor="middle">600M</text>
  <!-- label col separator -->
  <line x1="580" y1="50" x2="580" y2="340" stroke="#e1e0d9" stroke-width="0.5" stroke-dasharray="2,3"/>

